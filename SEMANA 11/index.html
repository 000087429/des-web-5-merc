<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Café Aurora es un café artesanal y panadería en Morelos, ofreciendo bebidas y productos frescos en un ambiente acogedor.">
  <title>Café Aurora -cafe artesanal y Panaderia en Morelos</title>
  <link rel="stylesheet" href="styles.css">
  <link rel = "icon" href="icono-cafe.png" type="image/png">
</head>
<body>

  <header class="hero">
    <nav>
      <p class="logo">Café Aurora</p>
      <a href="#contacto">Solicitar información</a>
    </nav>

    <section>
      <h1>Café Aurora</h1>
      <p>Café artesanal para personas que buscan una pausa especial durante el día.</p>
      <a class="boton" href="#contacto">Reservar una visita</a>
    </section>
  </header>

  <main>
    <section class="seccion">
      <h2>Beneficios</h2>
      <img src="Taza de Cafe.jpg" alt="Taza de cafe recien preparada">
      <p>Tenemos bebidas artesanales, panadería fresca y un ambiente cómodo para trabajar o convivir.</p>
    </section>

    <section class="seccion" id="contacto">
      <h2>Contacto</h2>
      <form>
        <input type="text" placeholder="Nombre">
        <input type="email" placeholder="Correo">
        <textarea placeholder="Mensaje"></textarea>
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

</body>
</html>
